services:
  - type: web
    name: valueai-backend
    runtime: docker
    plan: starter
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        value: placeholder-will-set-manually
      - key: JWT_SECRET
        value: placeholder-will-set-manually
      - key: ENCRYPTION_KEY
        value: placeholder-will-set-manually
      - key: FRONTEND_URL
        value: placeholder-will-set-manually
    healthCheckPath: /health
